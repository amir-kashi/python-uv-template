services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    command:
      [
        "uv",
        "run",
        "streamlit",
        "run",
        "src/app/main.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
      ]
    volumes:
      - ./logs:/workspace/logs
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.api.api:fastapi_app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    volumes:
      - ./logs:/workspace/logs
    restart: unless-stopped
