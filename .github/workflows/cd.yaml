name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  build-docker:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    name: Build & Push Docker Images to ACR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Streamlit image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-streamlit-${{ github.event.workflow_run.head_branch }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-streamlit-${{ github.event.workflow_run.head_branch }}:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-streamlit-${{ github.event.workflow_run.head_branch }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-streamlit-${{ github.event.workflow_run.head_branch }}:buildcache,mode=max

      - name: Build and push FastAPI image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.fastapi
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-fastapi-${{ github.event.workflow_run.head_branch }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-fastapi-${{ github.event.workflow_run.head_branch }}:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-fastapi-${{ github.event.workflow_run.head_branch }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-fastapi-${{ github.event.workflow_run.head_branch }}:buildcache,mode=max

  deploy:
    name: Deploy to Production
    needs: build-docker
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Streamlit image to Azure Web App
        id: deploy_streamlit
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_STREAMLIT }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-streamlit-${{ github.event.workflow_run.head_branch }}:${{ needs.build-docker.outputs.version }}

      - name: Configure Streamlit Web App settings
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_WEBAPP_NAME_STREAMLIT }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITES_PORT=8501 WEBSITES_CONTAINER_START_TIME_LIMIT=600

      - name: Restart Streamlit Web App
        run: |
          az webapp restart \
            --name ${{ secrets.AZURE_WEBAPP_NAME_STREAMLIT }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

      - name: Deploy FastAPI image to Azure Web App
        id: deploy_fastapi
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_FASTAPI }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.event.repository.name }}-fastapi-${{ github.event.workflow_run.head_branch }}:${{ needs.build-docker.outputs.version }}

      - name: Configure FastAPI Web App settings
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_WEBAPP_NAME_FASTAPI }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITES_PORT=8000 WEBSITES_CONTAINER_START_TIME_LIMIT=600

      - name: Restart FastAPI Web App
        run: |
          az webapp restart \
            --name ${{ secrets.AZURE_WEBAPP_NAME_FASTAPI }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

      - name: Output deployment info
        id: deploy_info
        run: |
          echo "streamlit_url=https://${{ secrets.AZURE_WEBAPP_NAME_STREAMLIT }}.azurewebsites.net"
          echo "fastapi_url=https://${{ secrets.AZURE_WEBAPP_NAME_FASTAPI }}.azurewebsites.net"
