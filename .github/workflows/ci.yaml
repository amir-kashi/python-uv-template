name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

jobs:

  mypy:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies (uv)
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --frozen --no-cache --group dev

      - name: Run mypy
        run: uv run mypy src/

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies (uv)
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --frozen --no-cache --group dev

      - name: Run Ruff linter
        run: uv run ruff check src/ tests/ --output-format=github

      - name: Check code formatting with Black
        run: uv run black --check src/ tests/

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies (uv)
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --frozen --no-cache --group dev

      - name: Run Bandit security check
        run: uv run bandit -r src/ -f json -o bandit-report.json

      - name: Check dependencies with Safety
        run: uv run safety check --json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies (uv)
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --frozen --no-cache

      - name: Run tests with Pytest
        run: uv run pytest tests/ -v --tb=short

      - name: Generate coverage report
        run: |
          uv run pytest tests/ --cov=src/ --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          # token: ${{ secrets.CODECOV_TOKEN }}  # TODO: Set this up in your repository secrets
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [mypy, lint, security-scan, test]
    if: always()
    steps:
      - name: Decide whether all checks passed
        run: |
          if [[ "${{ needs.mypy.result }}" != "success" ||
                "${{ needs.lint.result }}" != "success" ||
                "${{ needs.security-scan.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed!"
